# Series de INEGI a recolectar, por sector SCIAN.
#
# `indicator_id` son los IDs numéricos del Banco de Indicadores de INEGI.
# Los que traen `verified: false` son los IDs más citados en documentación
# pública/tutoriales de INEGI para ese concepto, PERO no pude confirmarlos
# en vivo desde este entorno (sin salida de red a inegi.org.mx). Antes de
# usarlos en producción corre:
#
#   python -m pipeline.collectors.inegi.verify_series --indicator-id <ID>
#
# y confirma que el nombre/descripción que regresa corresponde a lo
# esperado. Para encontrar el ID correcto si el de aquí no aplica, usa el
# Constructor de Consultas: https://www.inegi.org.mx/app/indicadores/

# CONFIRMADO INVÁLIDO en producción (corrida real en GitHub Actions,
# 2026-07-07): INEGI respondió "ErrorCode:100 - No se encontraron
# resultados" para el ID 444612. No es solo "sin verificar", ya sabemos que
# está mal — hay que reemplazarlo por el ID correcto vía el Constructor de
# Consultas (busca "Tasa de desocupación" ENOE nacional desestacionalizada).
# Mientras tanto el pipeline lo salta sin tronar (ver collect.py), así que
# no bloquea la recolección de las demás series.
national:
  - indicator_id: "444612"
    source: ENOE
    description: "Tasa de desocupación (TD), nacional, series ajustada por estacionalidad"
    frequency: monthly
    verified: false
  - indicator_id: "436148"
    source: IGAE
    description: "Indicador Global de la Actividad Económica (IGAE), variación mensual"
    frequency: monthly
    verified: false

# CONFIRMADO EN PRODUCCIÓN (2026-07-07): estas 3 claves de EMIM (702844,
# 704728, 706612), aunque son correctas y visibles en el Banco de
# Indicadores web de INEGI, NO son consultables por el método genérico
# INDICATOR con fuente de datos BISE — regresan "ErrorCode:100 - No se
# encontraron resultados". Se probó exhaustivamente: patrón de URL, área
# geográfica (00 y 0700), recientes (true/false) — todo según la sintaxis
# oficial documentada por INEGI. Como control, el indicador de ejemplo de
# la propia documentación de INEGI (1002000001) SÍ funciona con el mismo
# código, confirmando que el problema es específico de EMIM, no del
# cliente/token. Probablemente EMIM vive en otro catálogo/fuente de datos
# de INEGI no expuesto igual que los indicadores "core" de BISE. Pendiente:
# preguntar a atencion.usuarios@inegi.org.mx cómo consultar EMIM vía API, o
# usar sus descargas de tablas en bruto como alternativa a este endpoint.
by_sector:
  "31-33":
    - indicator_id: "702844"
      source: EMIM
      description: "Personal ocupado total, Total Industrias manufactureras (número de personas), EMIM Serie 2018"
      frequency: monthly
      verified: false
    - indicator_id: "704728"
      source: EMIM
      description: "Horas trabajadas por el personal ocupado total, Total Industrias manufactureras (miles de horas), EMIM Serie 2018"
      frequency: monthly
      verified: false
    - indicator_id: "706612"
      source: EMIM
      description: "Remuneraciones pagadas al personal ocupado, Total Industrias manufactureras (miles de pesos corrientes, nominal), EMIM Serie 2018"
      frequency: monthly
      verified: false

  # Para agregar otro sector piloto (ej. '54' Servicios profesionales),
  # localiza sus indicadores vía el Constructor de Consultas y agrega un
  # bloque igual a este bajo su código SCIAN.
